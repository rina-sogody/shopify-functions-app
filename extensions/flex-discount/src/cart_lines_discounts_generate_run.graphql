query RunInput {
  cart {
    lines {
      id
      quantity
      merchandise {
        ... on ProductVariant {
          id
          sku
        }
      }
      cost {
        totalAmount {
          amount
        }
      }
    }
  }
  discount {
    discountClasses
      metafield(namespace: "flex-discount", key: "config") {
      value
    }
  }
}
